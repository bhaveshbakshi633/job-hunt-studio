name: Refresh job board

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch: {}       # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-jobs
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scrape + curate
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python scripts/refresh_jobs.py
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain data/jobs.json)" ]; then
            git config user.name "job-board-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/jobs.json
            git commit -m "chore: auto-refresh job board ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "No changes."
          fi
